<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" fill="none" role="img" aria-label="Five elements cycle showing Wood, Fire, Earth, Metal, and Water in balance">
  <defs>
    <linearGradient id="el-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3efe9"/>
      <stop offset="100%" stop-color="#faf8f5"/>
    </linearGradient>
  </defs>
  <rect width="520" height="400" rx="24" fill="url(#el-bg)"/>
  <circle cx="260" cy="200" r="130" stroke="#d4ccc3" stroke-width="1" stroke-dasharray="6 4" opacity="0.6"/>
  <path d="M260 70 A130 130 0 0 1 383.6 260" stroke="#b91c38" stroke-width="1.5" fill="none" opacity="0.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#b91c38" opacity="0.5"/>
    </marker>
  </defs>
  <g font-family="Source Sans 3, sans-serif" text-anchor="middle">
    <circle cx="260" cy="70" r="42" fill="#ebe6df" stroke="#7a9e6e" stroke-width="1.5"/>
    <text x="260" y="66" font-size="12" font-weight="600" fill="#2c2420">Wood</text>
    <text x="260" y="82" font-size="9" fill="#3d3632" opacity="0.7">Growth</text>
    <circle cx="400" cy="155" r="42" fill="#ebe6df" stroke="#c45c3e" stroke-width="1.5"/>
    <text x="400" y="151" font-size="12" font-weight="600" fill="#2c2420">Fire</text>
    <text x="400" y="167" font-size="9" fill="#3d3632" opacity="0.7">Warmth</text>
    <circle cx="370" cy="290" r="42" fill="#ebe6df" stroke="#a68b5b" stroke-width="1.5"/>
    <text x="370" y="286" font-size="12" font-weight="600" fill="#2c2420">Earth</text>
    <text x="370" y="302" font-size="9" fill="#3d3632" opacity="0.7">Stability</text>
    <circle cx="150" cy="290" r="42" fill="#ebe6df" stroke="#8a8a8a" stroke-width="1.5"/>
    <text x="150" y="286" font-size="12" font-weight="600" fill="#2c2420">Metal</text>
    <text x="150" y="302" font-size="9" fill="#3d3632" opacity="0.7">Clarity</text>
    <circle cx="120" cy="155" r="42" fill="#ebe6df" stroke="#5b8fa8" stroke-width="1.5"/>
    <text x="120" y="151" font-size="12" font-weight="600" fill="#2c2420">Water</text>
    <text x="120" y="167" font-size="9" fill="#3d3632" opacity="0.7">Flow</text>
  </g>
  <text x="260" y="200" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="16" font-weight="500" fill="#b91c38">Balance</text>
  <text x="260" y="218" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="9" fill="#3d3632" opacity="0.6">not perfection</text>
  <text x="260" y="375" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="9" fill="#3d3632" opacity="0.55">Materials · Color · Light · Space · Texture</text>
</svg>
