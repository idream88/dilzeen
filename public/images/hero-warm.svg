<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8dfd4"/>
      <stop offset="45%" stop-color="#d4c4b4"/>
      <stop offset="100%" stop-color="#c4a898"/>
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b89a88" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f5ebe3" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fff8f0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d4c4b4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#warm)"/>
  <ellipse cx="1100" cy="320" rx="500" ry="400" fill="url(#glow)"/>
  <!-- Soft neighborhood horizon -->
  <path d="M0 620 Q400 560 800 600 T1600 580 L1600 900 L0 900 Z" fill="#a89080" opacity="0.25"/>
  <path d="M0 680 Q300 640 700 670 T1600 650 L1600 900 L0 900 Z" fill="#8a7568" opacity="0.2"/>
  <!-- Home silhouette -->
  <g transform="translate(900, 380)" opacity="0.35">
    <rect x="0" y="120" width="280" height="200" fill="#6b5a4e" rx="4"/>
    <polygon points="140,0 320,120 0,120" fill="#5a4a40"/>
    <rect x="40" y="180" width="60" height="80" fill="#4a3d35" rx="2"/>
    <rect x="120" y="160" width="50" height="50" fill="#f5ebe3" opacity="0.5" rx="2"/>
    <rect x="190" y="160" width="50" height="50" fill="#f5ebe3" opacity="0.4" rx="2"/>
    <rect x="120" y="230" width="50" height="50" fill="#f5ebe3" opacity="0.35" rx="2"/>
    <rect x="190" y="230" width="50" height="50" fill="#f5ebe3" opacity="0.3" rx="2"/>
  </g>
  <!-- Trees -->
  <ellipse cx="200" cy="580" rx="80" ry="120" fill="#7a8a70" opacity="0.2"/>
  <ellipse cx="350" cy="600" rx="60" ry="100" fill="#6a7a60" opacity="0.18"/>
  <ellipse cx="1400" cy="560" rx="100" ry="140" fill="#7a8a70" opacity="0.15"/>
</svg>
